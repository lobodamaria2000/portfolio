<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Event operations map</title>
  <desc id="desc">A roadmap-style operations board with delivery stages and event impact metrics.</desc>
  <defs>
    <linearGradient id="heroBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#18393b"/>
      <stop offset="0.52" stop-color="#10171b"/>
      <stop offset="1" stop-color="#4a2e24"/>
    </linearGradient>
    <pattern id="grid" width="110" height="110" patternUnits="userSpaceOnUse">
      <path d="M110 0H0V110" fill="none" stroke="#ffffff" stroke-opacity=".11" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="30" stdDeviation="28" flood-color="#050b0d" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="1800" height="1200" fill="url(#heroBg)"/>
  <rect width="1800" height="1200" fill="url(#grid)"/>
  <rect x="135" y="110" width="1530" height="970" rx="44" fill="#f3efe5" stroke="#ffffff" stroke-width="3" filter="url(#shadow)"/>
  <text x="225" y="215" fill="#455058" font-family="Arial, sans-serif" font-size="34">EVENT OPERATIONS MAP</text>
  <text x="225" y="320" fill="#10181c" font-family="Arial, sans-serif" font-size="72" font-weight="700">From roadmap to show day</text>
  <text x="225" y="392" fill="#4d5961" font-family="Arial, sans-serif" font-size="40">Stakeholders, logistics, documentation, vendors, participants and on-site</text>
  <text x="225" y="448" fill="#4d5961" font-family="Arial, sans-serif" font-size="40">teams aligned in one delivery rhythm.</text>
  <path d="M230 555H1570" stroke="#235f66" stroke-width="7"/>
  <g fill="#235f66" stroke="#f3efe5" stroke-width="7">
    <circle cx="230" cy="555" r="22"/>
    <circle cx="498" cy="555" r="22"/>
    <circle cx="766" cy="555" r="22"/>
    <circle cx="1034" cy="555" r="22"/>
    <circle cx="1302" cy="555" r="22"/>
    <circle cx="1570" cy="555" r="22"/>
  </g>
  <g fill="#1c272d" font-family="Arial, sans-serif" font-size="34">
    <text x="196" y="637">Brief</text>
    <text x="464" y="637">Plan</text>
    <text x="728" y="637">Align</text>
    <text x="974" y="637">Produce</text>
    <text x="1250" y="637">Deliver</text>
    <text x="1517" y="637">Debrief</text>
  </g>
  <g>
    <rect x="225" y="750" width="330" height="200" rx="24" fill="#ffffff" stroke="#d6cec3" stroke-width="2"/>
    <text x="259" y="832" fill="#b65a2e" font-family="Arial, sans-serif" font-size="58" font-weight="700">1,600+</text>
    <text x="261" y="903" fill="#404a52" font-family="Arial, sans-serif" font-size="30">participants</text>
    <rect x="610" y="750" width="285" height="200" rx="24" fill="#ffffff" stroke="#d6cec3" stroke-width="2"/>
    <text x="644" y="842" fill="#b65a2e" font-family="Arial, sans-serif" font-size="72" font-weight="700">70</text>
    <text x="646" y="903" fill="#404a52" font-family="Arial, sans-serif" font-size="30">cities</text>
    <rect x="950" y="750" width="290" height="200" rx="24" fill="#ffffff" stroke="#d6cec3" stroke-width="2"/>
    <text x="984" y="842" fill="#b65a2e" font-family="Arial, sans-serif" font-size="72" font-weight="700">14</text>
    <text x="986" y="903" fill="#404a52" font-family="Arial, sans-serif" font-size="30">stakeholder</text>
    <text x="986" y="938" fill="#404a52" font-family="Arial, sans-serif" font-size="30">groups</text>
    <rect x="1295" y="750" width="280" height="200" rx="24" fill="#ffffff" stroke="#d6cec3" stroke-width="2"/>
    <text x="1329" y="842" fill="#b65a2e" font-family="Arial, sans-serif" font-size="72" font-weight="700">6+1</text>
    <text x="1331" y="903" fill="#404a52" font-family="Arial, sans-serif" font-size="30">events</text>
  </g>
  <g fill="#235f66" fill-opacity=".65" stroke="#235f66" stroke-opacity=".22">
    <path d="M326 978C520 1008 701 980 912 1004C1130 1028 1300 982 1518 1008" fill="none"/>
    <path d="M346 994C550 970 720 1018 934 988C1132 960 1305 1038 1444 982" fill="none"/>
    <circle cx="326" cy="978" r="7"/><circle cx="346" cy="994" r="7"/><circle cx="394" cy="1018" r="7"/>
    <circle cx="512" cy="1004" r="7"/><circle cx="708" cy="972" r="7"/><circle cx="914" cy="1005" r="7"/>
    <circle cx="1012" cy="974" r="7"/><circle cx="1124" cy="1018" r="7"/><circle cx="1290" cy="1010" r="7"/>
    <circle cx="1444" cy="982" r="7"/><circle cx="1518" cy="1008" r="7"/>
  </g>
</svg>
